<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Maharashtra CAP — UG/PG Admission Helpdesk</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Inter:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap');

:root{
  --maroon:#15355C;
  --maroon-deep:#0C2238;
  --gold:#C9A24B;
  --gold-soft:#EFE0BC;
  --cream:#FBF7EF;
  --cream-deep:#F1E8D6;
  --ink:#2B231F;
  --ink-soft:#7A7066;
  --line:#E3D8C2;
  --good:#3F6B4F;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
.su-root{
  font-family:'Inter','Noto Sans Devanagari',sans-serif;
  color:var(--ink);
  background:var(--cream-deep);
  display:flex;
  justify-content:center;
  align-items:stretch;
  height:100vh;
  height:100dvh;
  padding:0;
  overflow:hidden;
}
.su-app{
  width:100%;
  max-width:560px;
  height:100%;
  background:var(--cream);
  display:flex;
  flex-direction:column;
  box-shadow:0 0 40px rgba(74,27,39,0.12);
  position:relative;
  overflow:hidden;
}
@media(min-width:560px){
  .su-root{padding:24px 0;}
  .su-app{border-radius:22px;border:1px solid var(--line);}
}

/* HEADER */
.su-header{
  background:linear-gradient(135deg,var(--maroon) 0%,var(--maroon-deep) 100%);
  color:#fff;
  padding:18px 20px 16px;
  position:relative;
  flex-shrink:0;
}
.su-header::after{
  content:"";
  position:absolute;left:0;right:0;bottom:0;height:4px;
  background:linear-gradient(90deg,var(--gold),var(--gold-soft),var(--gold));
}
.su-header-top{display:flex;align-items:center;gap:12px;}
.su-crest{
  width:42px;height:42px;border-radius:50%;
  background:var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-family:'Fraunces',serif;font-weight:700;font-size:17px;color:var(--maroon-deep);
  flex-shrink:0;
  border:2px solid rgba(255,255,255,0.5);
}
.su-titles{flex:1;min-width:0;}
.su-app-title{
  font-family:'Fraunces','Noto Sans Devanagari',serif;
  font-weight:700;font-size:16.5px;line-height:1.25;
  margin:0;
}
.su-app-sub{font-size:12px;opacity:0.85;margin-top:2px;}
.su-langs{display:flex;gap:6px;margin-top:14px;}
.su-quicklinks{margin-top:8px;}
.su-quicklink-btn{
  width:100%;
  background:var(--gold);
  color:var(--maroon-deep);
  border:none;
  padding:9px 10px;
  border-radius:9px;
  font-size:12.8px;
  font-weight:700;
  cursor:pointer;
  transition:.15s;
}
.su-quicklink-btn:hover{filter:brightness(1.07);}
.su-quicklink-btn:active{transform:scale(0.98);}
.su-lang-btn{
  flex:1;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.35);
  color:#fff;
  padding:7px 6px;
  border-radius:9px;
  font-size:12.5px;
  font-weight:600;
  cursor:pointer;
  transition:.15s;
}
.su-lang-btn.active{
  background:var(--gold);
  color:var(--maroon-deep);
  border-color:var(--gold);
}
.su-lang-btn:hover{filter:brightness(1.06);}

/* CHAT BODY */
.su-body{
  flex:1;
  overflow-y:auto;
  padding:18px 16px 8px;
  display:flex;
  flex-direction:column;
  gap:12px;
  scroll-behavior:smooth;
}
.su-row{display:flex;width:100%;}
.su-row.bot{justify-content:flex-start;}
.su-row.user{justify-content:flex-end;}
.su-bubble{
  max-width:86%;
  padding:11px 14px;
  border-radius:14px;
  font-size:14.5px;
  line-height:1.55;
  white-space:pre-line;
}
.su-bubble.bot{
  background:#fff;
  border:1px solid var(--line);
  border-top-left-radius:4px;
  color:var(--ink);
}
.su-bubble.bot .src{
  display:block;margin-top:7px;font-size:11.5px;color:var(--ink-soft);
  border-top:1px dashed var(--line);padding-top:6px;
}
.su-bubble.user{
  background:var(--maroon);
  color:#fff;
  border-top-right-radius:4px;
}
.su-typing{
  display:inline-flex;gap:4px;align-items:center;padding:4px 2px;
}
.su-typing span{
  width:6px;height:6px;border-radius:50%;background:var(--ink-soft);
  animation:su-bounce 1.1s infinite ease-in-out;
}
.su-typing span:nth-child(2){animation-delay:.15s;}
.su-typing span:nth-child(3){animation-delay:.3s;}
@keyframes su-bounce{0%,80%,100%{transform:translateY(0);opacity:.4;}40%{transform:translateY(-4px);opacity:1;}}

/* CHIPS */
.su-chip-wrap{
  display:flex;flex-wrap:wrap;gap:8px;margin-top:2px;max-width:92%;
}
.su-chip{
  background:var(--cream-deep);
  border:1px solid var(--gold);
  color:var(--maroon-deep);
  font-size:12.8px;
  font-weight:600;
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
  transition:.15s;
  line-height:1.3;
}
.su-chip:hover{background:var(--gold-soft);}
.su-chip:active{transform:scale(0.97);}
.su-chip.wide{flex-basis:100%;}
.su-chip.link{
  background:var(--gold);
  border-color:var(--gold);
  color:var(--maroon-deep);
}
.su-chip.link:hover{filter:brightness(1.07);}

.su-flow{
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px 14px 10px;
  max-width:94%;
  width:100%;
}
.su-flow-title{
  font-weight:700;font-size:13px;color:var(--maroon-deep);
  margin-bottom:10px;display:flex;align-items:center;gap:6px;
}
.su-flow-node{
  display:flex;align-items:center;gap:10px;
  background:var(--cream-deep);
  border:1px solid var(--gold);
  border-radius:10px;
  padding:10px 12px;
  cursor:pointer;
  transition:.15s;
  font-size:13px;
  font-weight:600;
  color:var(--ink);
}
.su-flow-node:hover{background:var(--gold-soft);}
.su-flow-node:active{transform:scale(0.98);}
.su-flow-node .num{
  width:22px;height:22px;border-radius:50%;
  background:var(--maroon);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;flex-shrink:0;
}
.su-flow-arrow{
  display:flex;justify-content:center;
  color:var(--gold);
  font-size:15px;
  padding:1px 0;
}
.su-flow-hint{font-size:10.5px;color:var(--ink-soft);text-align:center;margin-top:8px;}

.su-frontgrid{
  display:flex;
  gap:8px;
  width:100%;
  max-width:96%;
  align-items:flex-start;
}
.su-frontcol{
  flex:1;
  min-width:0;
  background:#fff;
  border:1px solid var(--line);
  border-radius:14px;
  padding:11px 8px;
}
.su-frontcol-title{
  font-weight:700;
  font-size:11.5px;
  color:var(--maroon-deep);
  margin-bottom:8px;
  display:flex;align-items:center;gap:4px;
  line-height:1.3;
}
.su-flow-node.compact{
  padding:7px 8px;
  font-size:11px;
  gap:6px;
  margin-bottom:6px;
  line-height:1.3;
}
.su-flow-node.compact .num{
  width:17px;height:17px;font-size:9.5px;
}
.su-flow-arrow.compact{font-size:12px;padding:0;}
.su-frontcol .su-flow-hint{margin-top:6px;font-size:9.5px;}

/* INPUT */
.su-inputbar{
  flex-shrink:0;
  display:flex;
  gap:8px;
  padding:12px 14px;
  border-top:1px solid var(--line);
  background:#fff;
}
.su-input{
  flex:1;
  border:1px solid var(--line);
  background:var(--cream);
  border-radius:22px;
  padding:11px 16px;
  font-size:14.5px;
  font-family:inherit;
  color:var(--ink);
  outline:none;
}
.su-input:focus{border-color:var(--maroon);}
.su-send{
  width:44px;height:44px;border-radius:50%;
  background:var(--maroon);
  color:#fff;border:none;cursor:pointer;
  font-size:17px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:.15s;
}
.su-send:hover{background:var(--maroon-deep);}
.su-send:active{transform:scale(0.94);}

.su-foot{
  font-size:10.8px;
  color:var(--ink-soft);
  text-align:center;
  padding:8px 16px 12px;
  background:#fff;
  border-top:1px dashed var(--line);
}

.su-voice-toggle{
  flex-shrink:0;
  width:34px;height:34px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.35);
  background:rgba(255,255,255,0.12);
  color:#fff;
  font-size:15px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:.15s;
}
.su-voice-toggle.off{opacity:0.45;}
.su-voice-toggle:hover{background:rgba(255,255,255,0.22);}

.su-mic{
  width:44px;height:44px;border-radius:50%;
  background:var(--cream-deep);
  border:1px solid var(--line);
  color:var(--maroon-deep);
  cursor:pointer;
  font-size:17px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:.15s;
}
.su-mic:hover{background:var(--gold-soft);}
.su-mic.listening{
  background:var(--maroon);
  color:#fff;
  animation:su-mic-pulse 1.3s infinite;
}
.su-mic.unsupported{display:none;}
@keyframes su-mic-pulse{
  0%{box-shadow:0 0 0 0 rgba(107,39,55,0.45);}
  70%{box-shadow:0 0 0 10px rgba(107,39,55,0);}
  100%{box-shadow:0 0 0 0 rgba(107,39,55,0);}
}

.su-listening-strip{
  display:none;
  align-items:center;
  gap:8px;
  background:var(--maroon);
  color:#fff;
  font-size:12.5px;
  font-weight:600;
  padding:7px 16px;
  flex-shrink:0;
}
.su-listening-strip.active{display:flex;}

</style>
</head>
<body>

<div class="su-root">

        <button class="su-voice-toggle" id="suVoiceToggle" onclick="suToggleVoice()" aria-label="Toggle spoken answers" title="Spoken answers">🔊</button>

    <div class="su-foot" id="suFoot">ℹ️ Based on the State CET Cell's Information Brochure 2025-26. Confirm current fees/dates on mahacet.org.</div>
  </div>
</div>

    en:"There are 6 candidature types: Maharashtra State (Types A-E based on your domicile/birthplace/parent's posting), All India, Minority, NRI, Foreign National/OCI/PIO, and Jammu & Kashmir-Ladakh Migrant. You can claim only ONE Maharashtra State type — e.g. Type A if you passed your qualifying exam from a Maharashtra institute and are domiciled/born here, Type B if only domiciled here, Type C/D if your parent is a Central/State Government employee posted in Maharashtra.\nSource: Information Brochure, Section 5",
    hi:"6 उम्मीदवारी प्रकार हैं: महाराष्ट्र राज्य (आपके अधिवास/जन्मस्थान/माता-पिता की पोस्टिंग के आधार पर टाइप A-E), ऑल इंडिया, माइनॉरिटी, NRI, विदेशी नागरिक/OCI/PIO, और जम्मू-कश्मीर-लद्दाख माइग्रेंट। आप केवल एक महाराष्ट्र राज्य टाइप का दावा कर सकते हैं — जैसे टाइप A अगर आपने महाराष्ट्र की संस्था से योग्यता परीक्षा पास की है और यहीं अधिवासित/जन्मे हैं, टाइप B अगर सिर्फ अधिवासित हैं, टाइप C/D अगर आपके माता-पिता केंद्र/राज्य सरकार के कर्मचारी हैं और महाराष्ट्र में तैनात हैं।\nस्रोत: Information Brochure, खंड 5",
    mr:"उमेदवारीचे 6 प्रकार आहेत: महाराष्ट्र राज्य (तुमचे अधिवास/जन्मस्थान/पालकांची नियुक्ती यानुसार टाइप A-E), ऑल इंडिया, अल्पसंख्याक, NRI, परदेशी नागरिक/OCI/PIO, आणि जम्मू-काश्मीर-लडाख स्थलांतरित. तुम्ही फक्त एकाच महाराष्ट्र राज्य प्रकाराचा दावा करू शकता — उदा. टाइप A जर तुम्ही महाराष्ट्रातील संस्थेतून पात्रता परीक्षा उत्तीर्ण केली असेल आणि इथेच अधिवासित/जन्मलेले असाल, टाइप B फक्त अधिवासित असल्यास, टाइप C/D जर तुमचे पालक केंद्र/राज्य सरकारी कर्मचारी असून महाराष्ट्रात नियुक्त असतील.\nस्रोत: Information Brochure, विभाग 5"
  }
},

  keywords:["eligibility","eligible","qualification","who can apply","minimum marks","engineering eligibility","pharmacy eligibility","architecture eligibility","nata","mht-cet","management eligibility","mca eligibility","पात्रता","अर्हता","गुण किती","कोण पात्र आहे","योग्यता"],
  answer:{
    en:"Eligibility varies by course: Engineering/Technology needs 10+2 with Physics+Maths (or PCB) at 45% (40% for reserved/EWS/PWD) plus a non-zero MHT-CET score. Pharmacy needs 10+2 with PCM or PCB. Architecture needs 10+2 PCM plus a valid NATA score. Management (BBA/BMS/MBA) needs any 10+2/Graduate degree plus a MAH-CET or MBA/MMS-CET score. MCA needs Maths at 10+2 or graduation plus a MAH-MCA-CET score. Each course has a detailed eligibility table in the brochure — check Section 7(7) for your exact course.\nSource: Information Brochure, Section 7(7)",
    hi:"पात्रता कोर्स के अनुसार अलग होती है: इंजीनियरिंग/टेक्नोलॉजी के लिए 10+2 में फिजिक्स+मैथ्स (या PCB) में 45% अंक (आरक्षित/EWS/PWD के लिए 40%) और MHT-CET में नॉन-ज़ीरो स्कोर चाहिए। फार्मेसी के लिए 10+2 में PCM या PCB चाहिए। आर्किटेक्चर के लिए 10+2 PCM और वैध NATA स्कोर चाहिए। मैनेजमेंट (BBA/BMS/MBA) के लिए कोई भी 10+2/ग्रेजुएट डिग्री और MAH-CET या MBA/MMS-CET स्कोर चाहिए। MCA के लिए 10+2 या ग्रेजुएशन में मैथ्स और MAH-MCA-CET स्कोर चाहिए। हर कोर्स की विस्तृत पात्रता तालिका ब्रोशर में है — अपने कोर्स के लिए सेक्शन 7(7) देखें।\nस्रोत: Information Brochure, खंड 7(7)",
    mr:"पात्रता अभ्यासक्रमानुसार वेगळी असते: अभियांत्रिकी/तंत्रज्ञानासाठी 10+2 मध्ये फिजिक्स+गणित (किंवा PCB) मध्ये 45% गुण (राखीव/EWS/PWD साठी 40%) आणि MHT-CET मध्ये नॉन-झिरो स्कोअर आवश्यक. फार्मसीसाठी 10+2 मध्ये PCM किंवा PCB आवश्यक. आर्किटेक्चरसाठी 10+2 PCM आणि वैध NATA स्कोअर आवश्यक. मॅनेजमेंट (BBA/BMS/MBA) साठी कोणतीही 10+2/पदवी आणि MAH-CET किंवा MBA/MMS-CET स्कोअर आवश्यक. MCA साठी 10+2 किंवा पदवीमध्ये गणित आणि MAH-MCA-CET स्कोअर आवश्यक. प्रत्येक अभ्यासक्रमाची सविस्तर पात्रता तक्ता ब्रोशरमध्ये आहे — तुमच्या अभ्यासक्रमासाठी विभाग 7(7) पाहा.\nस्रोत: Information Brochure, विभाग 7(7)"
  }

    mr:"महाराष्ट्र-अधिवासित उमेदवारांसाठी: SC 13%, ST 7%, VJ/DT(NT-A) 3%, NT-B 2.5%, NT-C 3.5%, NT-D 2%, OBC 19%, SEBC 10% (एकूण 60%). याव्यतिरिक्त: संरक्षण कर्मचाऱ्यांच्या मुलांसाठी 5%, दिव्यांग (40%+ बेंचमार्क अपंगत्व) साठी 5%, EWS साठी 10% (मंजूर प्रवेश क्षमतेपेक्षा जास्त), अनाथ उमेदवारांसाठी 1%, आणि महिला उमेदवारांसाठी 30% जागा राखीव (संरक्षण/PWD/अनाथ कोट्याला लागू नाही).\nस्रोत: Information Brochure, विभाग 7(6)"

{
  id:"cap_process", icon:"🔄",
  label:{en:"CAP Process & Stages", hi:"CAP प्रक्रिया व चरण", mr:"CAP प्रक्रिया व टप्पे"},
  keywords:["cap process","cap stages","how does cap work","centralized admission process","option form","facilitation centre","seat matrix","CAP प्रक्रिया","CAP कैसे काम करता है","CAP प्रक्रिया कशी चालते","ऑप्शन फॉर्म"],
  answer:{
    en:"CAP runs in stages: (1) Brochure published, (2) Online application + document upload, (3) Document verification at a Facilitation Centre, (4) Provisional then Final merit list with a grievance window, (5) Seat matrix published per round, (6) Fill an Option Form (up to 300 ranked choices), (7) Seats allotted across Rounds I-IV, (8) Accept/freeze your seat and report to the institute. Once you confirm your Option Form, you can't edit it for that round.\nSource: Information Brochure, Section 9",
    hi:"CAP कई चरणों में चलती है: (1) ब्रोशर प्रकाशित होता है, (2) ऑनलाइन आवेदन + दस्तावेज़ अपलोड, (3) फैसिलिटेशन सेंटर पर दस्तावेज़ सत्यापन, (4) ग्रीवेंस अवधि के साथ अनंतिम फिर अंतिम मेरिट सूची, (5) हर राउंड के लिए सीट मैट्रिक्स प्रकाशित, (6) ऑप्शन फॉर्म भरना (300 तक प्राथमिकताएं), (7) राउंड I-IV में सीट आवंटन, (8) सीट स्वीकार/फ्रीज़ करना और संस्थान में रिपोर्ट करना। ऑप्शन फॉर्म कन्फर्म करने के बाद उस राउंड के लिए उसे बदला नहीं जा सकता।\nस्रोत: Information Brochure, खंड 9",
    mr:"CAP अनेक टप्प्यांत चालते: (1) ब्रोशर प्रकाशित होते, (2) ऑनलाइन अर्ज + कागदपत्रे अपलोड, (3) फॅसिलिटेशन सेंटरवर कागदपत्र पडताळणी, (4) तक्रार कालावधीसह अनंतिम मग अंतिम गुणवत्ता यादी, (5) प्रत्येक फेरीसाठी सीट मॅट्रिक्स प्रकाशित, (6) ऑप्शन फॉर्म भरणे (300 पर्यंत प्राधान्यक्रम), (7) फेरी I-IV मध्ये जागा वाटप, (8) जागा स्वीकारणे/फ्रीझ करणे आणि संस्थेत रिपोर्ट करणे. ऑप्शन फॉर्म कन्फर्म केल्यानंतर त्या फेरीसाठी तो बदलता येत नाही.\nस्रोत: Information Brochure, विभाग 9"
  }
},

  id:"application_fees", icon:"💳",
  label:{en:"Application Fees", hi:"आवेदन शुल्क", mr:"अर्ज शुल्क"},
  keywords:["application fee","cap fee","how much application fee","fee for applying","registration fee cap","आवेदन शुल्क","अर्ज शुल्क","फीस कितनी","किती फी"],
  answer:{
    en:"Applying using only your MHT-CET score is FREE. If you apply using a national-level exam (JEE/NEET/NATA etc.) instead of MHT-CET, a non-refundable online fee applies: ₹1,000 (Maharashtra State/OMS/J&K-Ladakh general candidates), ₹800 (Reserved category, Maharashtra), ₹5,000 (NRI/OCI/PIO/Foreign nationals) for First Year Engineering/Pharmacy/Architecture/HMCT etc. Direct Second Year: ₹1,000 general / ₹800 reserved. These figures are from the 2025-26 brochure — confirm on mahacet.org for the current cycle.\nSource: Information Brochure, Section 9(1)(c)",
    hi:"केवल MHT-CET स्कोर से आवेदन करना मुफ्त है। यदि आप MHT-CET की जगह किसी राष्ट्रीय स्तर की परीक्षा (JEE/NEET/NATA आदि) से आवेदन करते हैं, तो अप्रतिदेय ऑनलाइन शुल्क लागू होता है: ₹1,000 (महाराष्ट्र राज्य/OMS/J&K-लद्दाख सामान्य उम्मीदवार), ₹800 (आरक्षित वर्ग, महाराष्ट्र), ₹5,000 (NRI/OCI/PIO/विदेशी नागरिक) प्रथम वर्ष इंजीनियरिंग/फार्मेसी/आर्किटेक्चर/HMCT आदि के लिए। डायरेक्ट सेकंड ईयर: ₹1,000 सामान्य / ₹800 आरक्षित। ये आंकड़े 2025-26 ब्रोशर से हैं — मौजूदा चक्र के लिए mahacet.org पर पुष्टि करें।\nस्रोत: Information Brochure, खंड 9(1)(c)",
    mr:"फक्त MHT-CET स्कोअरने अर्ज करणे मोफत आहे. जर तुम्ही MHT-CET ऐवजी राष्ट्रीय स्तरावरील परीक्षेने (JEE/NEET/NATA इ.) अर्ज केला, तर परतावा न मिळणारे ऑनलाइन शुल्क लागू होते: ₹1,000 (महाराष्ट्र राज्य/OMS/J&K-लडाख सर्वसाधारण उमेदवार), ₹800 (राखीव प्रवर्ग, महाराष्ट्र), ₹5,000 (NRI/OCI/PIO/परदेशी नागरिक) प्रथम वर्ष अभियांत्रिकी/फार्मसी/आर्किटेक्चर/HMCT इत्यादींसाठी. डायरेक्ट सेकंड इयर: ₹1,000 सर्वसाधारण / ₹800 राखीव. हे आकडे 2025-26 ब्रोशरमधील आहेत — सध्याच्या चक्रासाठी mahacet.org वर खात्री करा.\nस्रोत: Information Brochure, विभाग 9(1)(c)"
  }
},

  answer:{

    hi:"सभी उम्मीदवारों के लिए आवश्यक: SSC मार्कशीट, HSC/डिप्लोमा/B.Sc मार्कशीट, योग्यता परीक्षा मार्कशीट, CET/JEE/NEET/NATA/CUET/GATE/GPAT स्कोर कार्ड, नागरिकता प्रमाणपत्र, और स्कूल लीविंग सर्टिफिकेट (यदि आवश्यक हो)। इसके अलावा श्रेणी-विशिष्ट दस्तावेज़ भी लगते हैं: जाति + जाति वैधता प्रमाणपत्र (SC/ST/OBC/VJ-NT आदि), नॉन-क्रीमी लेयर प्रमाणपत्र, EWS पात्रता प्रमाणपत्र (Proforma V), अधिवास प्रमाणपत्र, और लागू होने पर रक्षा/PWD/अनाथ/माइनॉरिटी प्रमाणपत्र। अपने उम्मीदवार प्रकार के लिए पूरी दस्तावेज़ तालिका देखें।\nस्रोत: Information Brochure, खंड 17",
    mr:"सर्व उमेदवारांसाठी आवश्यक: SSC गुणपत्रिका, HSC/डिप्लोमा/B.Sc गुणपत्रिका, पात्रता परीक्षा गुणपत्रिका, CET/JEE/NEET/NATA/CUET/GATE/GPAT स्कोअर कार्ड, राष्ट्रीयत्व प्रमाणपत्र, आणि शाळा सोडल्याचा दाखला (आवश्यक असल्यास). याव्यतिरिक्त प्रवर्ग-विशिष्ट कागदपत्रेही लागतात: जात + जात वैधता प्रमाणपत्र (SC/ST/OBC/VJ-NT इ.), नॉन-क्रिमीलेयर प्रमाणपत्र, EWS पात्रता प्रमाणपत्र (Proforma V), अधिवास प्रमाणपत्र, आणि लागू असल्यास संरक्षण/PWD/अनाथ/अल्पसंख्याक प्रमाणपत्रे. तुमच्या उमेदवार प्रकारासाठी संपूर्ण कागदपत्र तक्ता पाहा.\nस्रोत: Information Brochure, विभाग 17"

{
  id:"merit_list", icon:"📈",
  label:{en:"Merit List", hi:"मेरिट सूची", mr:"गुणवत्ता यादी"},
  keywords:["merit list","merit number","tie breaking","how is merit calculated","percentile","provisional merit list","मेरिट सूची","मेरिट नंबर","गुणवत्ता यादी कशी ठरते","टाई"],
  answer:{
    en:"Your merit number is based on your CET score (or qualifying exam marks, for some courses) — you need to have submitted your application by the deadline to get one. Percentages are rounded to the nearest whole number (e.g. 44.50-44.99% rounds up to 45%). In case of a tie, it's broken first by higher Maths marks in CET, then Physics, then Chemistry, then combined percentage at the qualifying exam, and so on. Remember: the merit list only shows your relative rank — it does NOT guarantee a seat.\nSource: Information Brochure, Section 8",
    hi:"आपका मेरिट नंबर आपके CET स्कोर (या कुछ कोर्सेज़ के लिए योग्यता परीक्षा के अंकों) पर आधारित होता है — इसके लिए आवेदन समय सीमा के भीतर जमा करना ज़रूरी है। प्रतिशत निकटतम पूर्णांक तक राउंड किया जाता है (जैसे 44.50-44.99% को 45% तक राउंड किया जाता है)। टाई होने पर पहले CET में मैथ्स के ज़्यादा अंक, फिर फिजिक्स, फिर केमिस्ट्री, फिर योग्यता परीक्षा में संयुक्त प्रतिशत के आधार पर तय होता है। याद रखें: मेरिट सूची केवल आपकी सापेक्ष रैंक दिखाती है — यह सीट की गारंटी नहीं देती।\nस्रोत: Information Brochure, खंड 8",
    mr:"तुमचा मेरिट क्रमांक तुमच्या CET स्कोअरवर (किंवा काही अभ्यासक्रमांसाठी पात्रता परीक्षेच्या गुणांवर) आधारित असतो — यासाठी अंतिम तारखेपूर्वी अर्ज सादर करणे आवश्यक आहे. टक्केवारी जवळच्या पूर्णांकापर्यंत गोल केली जाते (उदा. 44.50-44.99% ही 45% पर्यंत गोल होते). टाय झाल्यास प्रथम CET मधील गणिताचे जास्त गुण, मग भौतिकशास्त्र, मग रसायनशास्त्र, मग पात्रता परीक्षेतील एकत्रित टक्केवारी यानुसार निर्णय होतो. लक्षात ठेवा: गुणवत्ता यादी फक्त तुमचा सापेक्ष क्रमांक दाखवते — ती जागेची हमी देत नाही.\nस्रोत: Information Brochure, विभाग 8"
  }
},
{
  id:"cap_rounds", icon:"🔁",
  label:{en:"CAP Rounds & Seat Freeze", hi:"CAP राउंड व सीट फ्रीज़", mr:"CAP फेऱ्या व सीट फ्रीझ"},
  keywords:["cap rounds","round 1","round 2","seat freeze","upgrade seat","how many rounds","freeze seat","CAP राउंड","सीट फ्रीज़","फेरी","सीट फ्रीझ"],
  answer:{
    en:"There are 4 CAP rounds. In Round I, if you get a seat other than your first preference, you can either freeze it (accept and stop participating) or stay in for an upgrade. From Round II onward, getting your first 3 (Round II) or first 6 (Round III) preferences auto-freezes your seat. If you don't report/accept by the deadline, your claim is automatically forfeited and the seat returns to the pool for the next round.\nSource: Information Brochure, Section 9(2)-9(3)",
    hi:"CAP के 4 राउंड होते हैं। राउंड I में, अगर आपको पहली प्राथमिकता के अलावा कोई सीट मिलती है, तो आप उसे फ्रीज़ (स्वीकार करके आगे की प्रक्रिया से बाहर) कर सकते हैं या अपग्रेड के लिए बने रह सकते हैं। राउंड II से आगे, पहली 3 (राउंड II) या पहली 6 (राउंड III) प्राथमिकताएं मिलने पर सीट अपने आप फ्रीज़ हो जाती है। यदि आप समय सीमा तक रिपोर्ट/स्वीकार नहीं करते, तो आपका दावा अपने आप समाप्त हो जाता है और सीट अगले राउंड के लिए वापस चली जाती है।\nस्रोत: Information Brochure, खंड 9(2)-9(3)",
    mr:"CAP च्या 4 फेऱ्या असतात. फेरी I मध्ये, जर तुम्हाला पहिल्या प्राधान्याव्यतिरिक्त इतर जागा मिळाली, तर तुम्ही ती फ्रीझ (स्वीकारून पुढील प्रक्रियेतून बाहेर) करू शकता किंवा अपग्रेडसाठी राहू शकता. फेरी II पासून पुढे, पहिल्या 3 (फेरी II) किंवा पहिल्या 6 (फेरी III) प्राधान्यांमध्ये जागा मिळाल्यास ती आपोआप फ्रीझ होते. जर तुम्ही मुदतीत रिपोर्ट/स्वीकार केले नाही, तर तुमचा दावा आपोआप रद्द होतो आणि जागा पुढील फेरीसाठी परत जाते.\nस्रोत: Information Brochure, विभाग 9(2)-9(3)"
  }
},
{
  id:"reporting", icon:"🏫",
  label:{en:"Reporting & Seat Confirmation", hi:"रिपोर्टिंग व सीट पुष्टि", mr:"रिपोर्टिंग व जागा निश्चिती"},
  keywords:["reporting","seat acceptance","provisional allotment letter","report to institute","seat confirmation","रिपोर्टिंग","सीट स्वीकृति","सीट निश्चिती","संस्थेत रिपोर्ट"],
  answer:{
    en:"Once allotted a seat, download your Provisional Seat Allotment Letter, pay the seat acceptance fee (₹1,000, non-refundable) online or at the Reporting Centre, and report with original documents for verification. Failing to report/accept by the deadline counts as rejecting the offer, and the seat is released for the next round.\nSource: Information Brochure, Section 12",
    hi:"सीट आवंटित होने के बाद, अपना अनंतिम सीट आवंटन पत्र डाउनलोड करें, सीट स्वीकृति शुल्क (₹1,000, अप्रतिदेय) ऑनलाइन या रिपोर्टिंग सेंटर पर भरें, और सत्यापन के लिए मूल दस्तावेज़ों के साथ रिपोर्ट करें। समय सीमा तक रिपोर्ट/स्वीकार न करने पर इसे ऑफर अस्वीकार करना माना जाता है, और सीट अगले राउंड के लिए जारी कर दी जाती है।\nस्रोत: Information Brochure, खंड 12",
    mr:"जागा वाटप झाल्यानंतर, तुमचे अनंतिम जागा वाटप पत्र डाउनलोड करा, जागा स्वीकृती शुल्क (₹1,000, परतावा न मिळणारे) ऑनलाइन किंवा रिपोर्टिंग सेंटरवर भरा, आणि पडताळणीसाठी मूळ कागदपत्रांसह रिपोर्ट करा. मुदतीत रिपोर्ट/स्वीकार न केल्यास ऑफर नाकारली असे मानले जाते, आणि जागा पुढील फेरीसाठी सोडली जाते.\nस्रोत: Information Brochure, विभाग 12"
  }
},
{

  label:{en:"Change of Course/Institution", hi:"कोर्स/संस्थान परिवर्तन", mr:"अभ्यासक्रम/संस्था बदल"},
  keywords:["change of course","change institution","change college","change my college","college change","transfer college","change branch","switch institute","change institute","कोर्स बदलना","संस्थान बदलना","कॉलेज बदलना","अभ्यासक्रम बदल","संस्था बदल","कॉलेज बदल"],
  answer:{
    en:"You can request a change of course/institution only after successfully completing Year 1 (or Year 2/3 for further changes), based on your marks and seat availability. No transfer is allowed mid-year, from Unaided to Government/Aided institutions, to Autonomous institutions, or for Supernumerary-quota admits. Transfers need the Principal's recommendation and the Director of Technical Education's approval.\nSource: Information Brochure, Section 16",
    hi:"आप कोर्स/संस्थान परिवर्तन के लिए केवल पहले वर्ष (या आगे के परिवर्तन के लिए दूसरे/तीसरे वर्ष) को सफलतापूर्वक पूरा करने के बाद, अपने अंकों और सीट उपलब्धता के आधार पर आवेदन कर सकते हैं। साल के बीच में, अनएडेड से सरकारी/एडेड संस्थानों में, ऑटोनॉमस संस्थानों में, या सुपरन्यूमेरी कोटे के तहत प्रवेशित छात्रों के लिए कोई स्थानांतरण नहीं होता। स्थानांतरण के लिए प्रिंसिपल की सिफारिश और तकनीकी शिक्षा निदेशक की मंजूरी चाहिए।\nस्रोत: Information Brochure, खंड 16",
    mr:"तुम्ही अभ्यासक्रम/संस्था बदलासाठी फक्त पहिले वर्ष (किंवा पुढील बदलासाठी दुसरे/तिसरे वर्ष) यशस्वीरित्या पूर्ण केल्यानंतर, तुमचे गुण आणि जागा उपलब्धतेनुसार अर्ज करू शकता. वर्षाच्या मध्यात, विनाअनुदानित ते सरकारी/अनुदानित संस्थांमध्ये, स्वायत्त संस्थांमध्ये, किंवा सुपरन्यूमररी कोट्याखाली प्रवेशित विद्यार्थ्यांसाठी कोणतेही स्थानांतर होत नाही. स्थानांतरासाठी प्राचार्यांची शिफारस आणि तंत्रशिक्षण संचालकांची मान्यता आवश्यक आहे.\nस्रोत: Information Brochure, विभाग 16"
  }

    hi:"रद्द करने के लिए ऑनलाइन आवेदन करें — जमा होते ही आपका प्रवेश तुरंत रद्द माना जाता है। यदि आप 'पूर्ण वापसी की अंतिम तिथि' से पहले रद्द करते हैं, तो ₹1,000 प्रोसेसिंग शुल्क काटकर आपकी फीस वापस मिलती है, और मूल दस्तावेज़ 2 दिनों के भीतर लौटा दिए जाते हैं। उस तिथि के बाद रद्द करने पर केवल सिक्योरिटी डिपॉज़िट/कॉशन मनी वापस मिलती है — फीस वापस नहीं होती।\nस्रोत: Information Brochure, खंड 15",
    mr:"रद्द करण्यासाठी ऑनलाइन अर्ज करा — सादर केल्यावर लगेच तुमचा प्रवेश रद्द मानला जातो. जर तुम्ही 'पूर्ण परताव्याच्या अंतिम तारखे'पूर्वी रद्द केले, तर ₹1,000 प्रक्रिया शुल्क वजा करून तुमची फी परत मिळते, आणि मूळ कागदपत्रे 2 दिवसांत परत केली जातात. त्या तारखेनंतर रद्द केल्यास फक्त सिक्युरिटी डिपॉझिट/कॉशन मनी परत मिळते — फी परत मिळत नाही.\nस्रोत: Information Brochure, विभाग 15"

{
  id:"institutional_quota", icon:"🏛️",
  label:{en:"Institutional Quota / Vacant Seats", hi:"इंस्टिट्यूशनल कोटा / रिक्त सीटें", mr:"संस्थात्मक कोटा / रिक्त जागा"},
  keywords:["institutional quota","vacant seats after cap","management quota","leftover seats","इंस्टिट्यूशनल कोटा","रिक्त सीटें","संस्थात्मक कोटा","रिक्त जागा"],
  answer:{
    en:"After all 4 CAP rounds, any seats still vacant (Institutional Quota, Supernumerary OCI/PIO/Foreign/CIWGC seats) are filled directly by the institution based on Inter-Se-Merit — prioritizing Maharashtra State candidates over All India candidates, and Indian candidates over NRI/Foreign/OCI/PIO candidates. The institution must publish its own admission rules and notify the schedule on its website.\nSource: Information Brochure, Section 13",
    hi:"सभी 4 CAP राउंड के बाद, जो भी सीटें खाली रहती हैं (इंस्टिट्यूशनल कोटा, सुपरन्यूमेरी OCI/PIO/विदेशी/CIWGC सीटें), उन्हें संस्थान इंटर-से-मेरिट के आधार पर सीधे भरता है — महाराष्ट्र राज्य उम्मीदवारों को ऑल इंडिया उम्मीदवारों से और भारतीय उम्मीदवारों को NRI/विदेशी/OCI/PIO उम्मीदवारों से प्राथमिकता देते हुए। संस्थान को अपने प्रवेश नियम प्रकाशित करने होते हैं और वेबसाइट पर शेड्यूल बताना होता है।\nस्रोत: Information Brochure, खंड 13",
    mr:"सर्व 4 CAP फेऱ्यांनंतर, जी काही जागा रिक्त राहते (संस्थात्मक कोटा, सुपरन्यूमररी OCI/PIO/परदेशी/CIWGC जागा), ती संस्था इंटर-से-मेरिटच्या आधारे थेट भरते — महाराष्ट्र राज्य उमेदवारांना ऑल इंडिया उमेदवारांपेक्षा आणि भारतीय उमेदवारांना NRI/परदेशी/OCI/PIO उमेदवारांपेक्षा प्राधान्य देत. संस्थेला स्वतःचे प्रवेश नियम प्रकाशित करावे लागतात आणि वेबसाइटवर वेळापत्रक कळवावे लागते.\nस्रोत: Information Brochure, विभाग 13"
  }
},
{
  id:"tfws_workingprof", icon:"🎟️",
  label:{en:"TFWS & Working Professional Quota", hi:"TFWS व वर्किंग प्रोफेशनल कोटा", mr:"TFWS व वर्किंग प्रोफेशनल कोटा"},
  keywords:["tfws","tuition fee waiver","working professional","income certificate 8 lakh","fee waiver scheme","ट्यूशन फीस माफी","वर्किंग प्रोफेशनल","फी माफी योजना"],
  answer:{
    en:"TFWS (Tuition Fee Waiver Scheme): up to 5% supernumerary seats per course (Engineering, Pharmacy, HMCT, Design, Planning) for Maharashtra-domiciled candidates with family income under ₹8 Lakh/year. Only the tuition fee is waived — other fees still apply, and you can't change institute/course afterward. Working Professional admission needs at least 1 year of full-time industry experience, with classes typically held in flexible/evening hours.\nSource: Information Brochure, Sections 7(5)(c) & 12(p)",
    hi:"TFWS (ट्यूशन फीस माफी योजना): ₹8 लाख/वर्ष से कम पारिवारिक आय वाले महाराष्ट्र-अधिवासित उम्मीदवारों के लिए हर कोर्स (इंजीनियरिंग, फार्मेसी, HMCT, डिज़ाइन, प्लानिंग) में 5% तक सुपरन्यूमेरी सीटें। केवल ट्यूशन फीस माफ होती है — बाकी शुल्क लागू रहते हैं, और बाद में संस्थान/कोर्स नहीं बदला जा सकता। वर्किंग प्रोफेशनल प्रवेश के लिए कम से कम 1 वर्ष का फुल-टाइम इंडस्ट्री अनुभव चाहिए, कक्षाएं आमतौर पर शाम/लचीले समय पर होती हैं।\nस्रोत: Information Brochure, खंड 7(5)(c) व 12(p)",
    mr:"TFWS (ट्युशन फी माफी योजना): ₹8 लाख/वर्षपेक्षा कमी कौटुंबिक उत्पन्न असलेल्या महाराष्ट्र-अधिवासित उमेदवारांसाठी प्रत्येक अभ्यासक्रमात (अभियांत्रिकी, फार्मसी, HMCT, डिझाइन, प्लानिंग) 5% पर्यंत सुपरन्यूमररी जागा. फक्त ट्युशन फी माफ होते — इतर शुल्क लागू राहतात, आणि नंतर संस्था/अभ्यासक्रम बदलता येत नाही. वर्किंग प्रोफेशनल प्रवेशासाठी किमान 1 वर्षाचा फुल-टाइम इंडस्ट्री अनुभव आवश्यक आहे, वर्ग सहसा संध्याकाळी/लवचिक वेळेत असतात.\nस्रोत: Information Brochure, विभाग 7(5)(c) व 12(p)"
  }
},
{
  id:"general_notes", icon:"⚠️",
  label:{en:"Important Notes", hi:"महत्वपूर्ण बातें", mr:"महत्त्वाच्या बाबी"},
  keywords:["important notes","general provisions","fake documents","application id password","keep in mind","merit list guarantee","महत्वपूर्ण बातें","सावधानी","महत्त्वाच्या बाबी"],

var suLang = "en";
var suBody = document.getElementById('suBody');
var suInput = document.getElementById('suInput');

// --- Voice (free, browser-built-in — no API key, no server, no cost) ---
var suSpeechLangMap = { en:"en-IN", hi:"hi-IN", mr:"mr-IN" };
var suVoiceEnabled = true;      // spoken answers, on by default
var suListening = false;
var suRecognition = null;
var SpeechRecognitionImpl = window.SpeechRecognition || window.webkitSpeechRecognition;
var suSTTSupported = !!SpeechRecognitionImpl;
var suTTSSupported = !!window.speechSynthesis;
var suMicBtn = document.getElementById('suMicBtn');
var suVoiceToggleBtn = document.getElementById('suVoiceToggle');
var suListeningStrip = document.getElementById('suListeningStrip');

if(!suSTTSupported && suMicBtn){
  // mic not available on this browser (e.g. Safari/iOS, Firefox) — hide rather than show a broken button
  suMicBtn.classList.add('unsupported');
}
if(!suTTSSupported && suVoiceToggleBtn){
  suVoiceToggleBtn.style.display = 'none';
}

function suToggleVoice(){
  if(!suTTSSupported) return;
  suVoiceEnabled = !suVoiceEnabled;
  suVoiceToggleBtn.textContent = suVoiceEnabled ? "🔊" : "🔇";
  suVoiceToggleBtn.classList.toggle('off', !suVoiceEnabled);
  if(!suVoiceEnabled) window.speechSynthesis.cancel();
}

function suSpeak(text){
  if(!suTTSSupported || !suVoiceEnabled) return;
  window.speechSynthesis.cancel();
  // skip the "Source: ..." citation line when reading aloud — it's not useful spoken
  var spoken = text.split("\nSource:")[0].split("\nस्रोत:")[0];
  var utter = new SpeechSynthesisUtterance(spoken);
  utter.lang = suSpeechLangMap[suLang] || "en-IN";
  var voices = window.speechSynthesis.getVoices();
  var match = voices.find(function(v){ return v.lang === utter.lang; }) ||
              voices.find(function(v){ return v.lang && v.lang.indexOf(suLang) === 0; });
  if(match) utter.voice = match;
  utter.rate = 0.97;
  window.speechSynthesis.speak(utter);
}

function suToggleMic(){
  if(!suSTTSupported) return;
  if(suListening){ suRecognition && suRecognition.stop(); return; }
  suRecognition = new SpeechRecognitionImpl();
  suRecognition.lang = suSpeechLangMap[suLang] || "en-IN";
  suRecognition.interimResults = false;
  suRecognition.maxAlternatives = 1;

  suRecognition.onstart = function(){
    suListening = true;
    suMicBtn.classList.add('listening');
    suListeningStrip.classList.add('active');
    document.getElementById('suListeningText').textContent = UI[suLang].listening;
    if(suTTSSupported) window.speechSynthesis.cancel();
  };
  suRecognition.onresult = function(event){
    var transcript = event.results[0][0].transcript;
    suInput.value = transcript;
    suSendUser();
  };
  suRecognition.onerror = function(){ /* mic permission denied or no speech — fail quietly */ };
  suRecognition.onend = function(){
    suListening = false;
    suMicBtn.classList.remove('listening');
    suListeningStrip.classList.remove('active');
  };
  try{ suRecognition.start(); }catch(e){}
}

function suGreetWords(){
  return ["hi","hello","hey","namaste","नमस्ते","नमस्कार","menu","help","topics","hii","hlo"];
}

function suSetLang(lang){
  suLang = lang;
  document.querySelectorAll('.su-lang-btn').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('data-lang')===lang);
  });
  var u = UI[lang];
  document.getElementById('suAppTitle').textContent = u.title;
  document.getElementById('suAppSub').textContent = u.sub;
  document.getElementById('suFoot').textContent = u.disclaimer;
  document.getElementById('suCutoffTab').textContent = u.cutoffTab;
  suInput.placeholder = u.placeholder;
  if(suTTSSupported) window.speechSynthesis.cancel();
  suBody.innerHTML = "";
  suBotSay(u.greeting, false);
  setTimeout(suShowFrontPage, 600);
}

    {num:2, icon:"✅", topicId:"documents", label:{en:"Document Verification", hi:"दस्तावेज़ सत्यापन", mr:"कागदपत्र पडताळणी"}},
    {num:3, icon:"📊", topicId:"merit_list", label:{en:"Merit List (Provisional → Final)", hi:"मेरिट सूची (अनंतिम → अंतिम)", mr:"गुणवत्ता यादी (अनंतिम → अंतिम)"}},

      var arrow = document.createElement('div');
      arrow.className = 'su-flow-arrow compact';

      leftCol.appendChild(arrow);

  });

  var hint = document.createElement('div');
  hint.className = 'su-flow-hint';
  hint.textContent = UI[suLang].flowHint;
  leftCol.appendChild(hint);

  // RIGHT column — every topic, clickable
  var rightCol = document.createElement('div');
  rightCol.className = 'su-frontcol';
  var rightTitle = document.createElement('div');
  rightTitle.className = 'su-frontcol-title';
  rightTitle.textContent = UI[suLang].allTopics;

  TOPICS.forEach(function(t){
    var item = document.createElement('div');
    item.className = 'su-flow-node compact';
    item.innerHTML = '<span>'+t.icon+' '+suEscape(t.label[suLang])+'</span>';

function suEscape(s){
  var d = document.createElement('div');
  d.innerText = s;

function suScrollDown(){
  setTimeout(function(){ suBody.scrollTop = suBody.scrollHeight; }, 60);
}

function suBotSay(text, withTopics){
  var typingRow = document.createElement('div');
  typingRow.className = 'su-row bot';
  typingRow.innerHTML = '<div class="su-bubble bot"><div class="su-typing"><span></span><span></span><span></span></div></div>';
  suBody.appendChild(typingRow);
  suScrollDown();
  setTimeout(function(){
    typingRow.remove();
    var row = document.createElement('div');
    row.className = 'su-row bot';
    var bubble = document.createElement('div');

    bubble.innerHTML = suEscape(text).replace(/\n/g,'<br>');
    row.appendChild(bubble);
    suBody.appendChild(row);

function suAnswerTopic(topic){

  if(topic.link){

  } else {

  }
}

function suTokenize(str){
  return str.toLowerCase()
    .replace(/[.,!?;:()'"₹/]/g," ")
    .split(/\s+/)
    .filter(Boolean);
}

function suSearch(query){
  var qLower = " " + query.toLowerCase() + " ";
  var qTokens = suTokenize(query);
  var ranked = [];
  TOPICS.forEach(function(t){
    var score = 0;
    t.keywords.forEach(function(k){
      var kLower = k.toLowerCase();
      var kWords = kLower.split(/\s+/).filter(Boolean);
      if(kWords.length > 1 && qLower.indexOf(" " + kLower + " ") !== -1){
        // strong signal: the exact multi-word phrase appears in the question
        score += kWords.length * 4;
      } else {
        // weaker signal: every word of the keyword shows up somewhere in the
        // question (handles reordered / paraphrased questions, e.g. "how
        // much time is required to complete phd" still matches "time required")
        var allPresent = kWords.every(function(w){ return qTokens.indexOf(w) !== -1; });
        if(allPresent){ score += kWords.length; }
      }
    });
    if(score > 0) ranked.push({topic:t, score:score});
  });
  ranked.sort(function(a,b){ return b.score - a.score; });
  return ranked;
}

// Decides what to do with a search: a single confident match, a short list
// of close candidates to ask the user to disambiguate, or nothing found.
function suResolveQuery(query){
  var ranked = suSearch(query);
  if(ranked.length === 0) return {type:"none"};
  if(ranked.length === 1) return {type:"single", topic:ranked[0].topic};
  var top = ranked[0], second = ranked[1];
  // a clear winner: top score comfortably ahead of the runner-up
  if(top.score >= second.score * 1.6){
    return {type:"single", topic:top.topic};
  }
  // close scores: ask the student which one they meant, rather than guessing
  var candidates = [top.topic, second.topic];
  if(ranked.length > 2 && ranked[2].score >= second.score * 0.8){
    candidates.push(ranked[2].topic);
  }
  return {type:"clarify", candidates:candidates};
}

function suShowClarifyChips(candidates){
  var row = document.createElement('div');
  row.className = 'su-row bot';
  var wrap = document.createElement('div');
  wrap.className = 'su-chip-wrap';
  candidates.forEach(function(t){
    var chip = document.createElement('div');
    chip.className = 'su-chip';
    chip.innerText = t.icon + ' ' + t.label[suLang];
    chip.onclick = function(){ suUserSay(t.icon + ' ' + t.label[suLang]); suAnswerTopic(t); };
    wrap.appendChild(chip);
  });
  row.appendChild(wrap);
  suBody.appendChild(row);
  suScrollDown();
}

function suSendUser(){
  var val = suInput.value.trim();
  if(!val) return;
  suUserSay(val);
  suInput.value = "";
  var lower = val.toLowerCase();
  if(suGreetWords().some(function(w){ return lower===w || lower.indexOf(w)!==-1; }) && val.length < 12){
    suBotSay(UI[suLang].topicsHeading, true);
    return;
  }
  var result = suResolveQuery(val);
  if(result.type === "single"){
    suAnswerTopic(result.topic);
  } else if(result.type === "clarify"){
    suBotSay(UI[suLang].didYouMean, false);
    setTimeout(function(){ suShowClarifyChips(result.candidates); }, 520);
  } else {
    suBotSay(UI[suLang].fallback, true);
  }
}

window.suSendUser = suSendUser;
window.suSetLang = suSetLang;
window.suToggleMic = suToggleMic;
window.suToggleVoice = suToggleVoice;

// init
suSetLang('en');
})();
